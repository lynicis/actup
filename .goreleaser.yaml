version: 2

project_name: actup

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\\([\\w\\s]+\\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\\([\\w\\s]+\\))?!?:.+$'
      order: 1
    - title: Improvements
      regexp: '^.*?refactor(\\([\\w\\s]+\\))?!?:.+$'
      order: 2

release:
  github:
    owner: lynicis
    name: actup
  draft: false
  prerelease: auto

snapshot:
  version_template: "{{ .Version }}-{{ .ShortCommit }}"

dist: dist
