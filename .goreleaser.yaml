version: 2

project_name: actup

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\\([\\w\\s]+\\))?!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\\([\\w\\s]+\\))?!?:.+$'
      order: 1
    - title: Improvements
      regexp: '^.*?refactor(\\([\\w\\s]+\\))?!?:.+$'
      order: 2

release:
  github:
    owner: lynicis
    name: actup
  draft: false
  prerelease: auto

nfpms:
  - id: packages
    package_name: actup
    vendor: Emre Sırmalı
    homepage: https://github.com/lynicis/actup
    maintainer: Emre Sırmalı <me@lynicis.dev>
    description: Upgrade GitHub Actions versions interactively from your terminal
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

chocolateys:
  - name: actup
    owners: Emre Sırmalı
    title: Actup
    authors: lynicis
    project_url: https://github.com/lynicis/actup
    copyright: 2026 Emre Sırmalı
    license_url: https://github.com/lynicis/actup/blob/main/LICENSE
    project_source_url: https://github.com/lynicis/actup
    docs_url: https://github.com/lynicis/actup/blob/main/README.md
    bug_tracker_url: https://github.com/lynicis/actup/issues
    tags: "github actions upgrade devops cli"
    summary: "Upgrade GitHub Actions versions interactively from your terminal"
    description: |
      Actup scans your GitHub Actions workflow files and interactively upgrades
      action versions. It detects known breaking changes between major versions
      and warns before upgrading.
    release_notes: "https://github.com/lynicis/actup/releases/tag/v{{ .Version }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"

scoops:
  - name: actup
    repository:
      owner: lynicis
      name: scoop-bucket
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    commit_msg_template: "Scoop manifest update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/lynicis/actup
    description: Upgrade GitHub Actions versions interactively from your terminal
    license: MIT

dockers_v2:
  - images:
      - "ghcr.io/lynicis/actup"
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - "--pull"
    annotations:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "Upgrade GitHub Actions versions interactively from your terminal"
      org.opencontainers.image.url: "https://github.com/lynicis/actup"
      org.opencontainers.image.source: "https://github.com/lynicis/actup"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: "MIT"
