version: 2

project_name: actup

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [zip]

checksum:
  disable: true

changelog:
  disable: true

release:
  disable: true

chocolateys:
  - name: actup
    owners: Emre Sırmalı
    title: Actup
    authors: lynicis
    project_url: https://github.com/lynicis/actup
    copyright: 2026 Emre Sırmalı
    license_url: https://github.com/lynicis/actup/blob/main/LICENSE
    project_source_url: https://github.com/lynicis/actup
    docs_url: https://github.com/lynicis/actup/blob/main/README.md
    bug_tracker_url: https://github.com/lynicis/actup/issues
    tags: "github actions upgrade devops cli"
    summary: "Upgrade GitHub Actions versions interactively from your terminal"
    description: |
      Actup scans your GitHub Actions workflow files and interactively upgrades
      action versions. It detects known breaking changes between major versions
      and warns before upgrading.
    release_notes: "https://github.com/lynicis/actup/releases/tag/v{{ .Version }}"
    url_template: "https://github.com/lynicis/actup/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
